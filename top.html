<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamping Memorial Site</title>
    <style>
        /* --- 全体のリセットと基本設定 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #fcfbf7; /* 温かみのあるオフホワイト */
            color: #4a4a4a;
            line-height: 1.6;
        }

        /* --- ヘッダー --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.03), rgba(0,0,0,0));
        }
        header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1rem;
            color: #7f8c8d;
        }

        /* --- メインコンテンツ枠 --- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        /* --- フォトギャラリー（写真3枚） --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .photo-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* 画像の比率を保ったまま綺麗に収めます */
            display: block;
        }

        /* --- ボタンエリア --- */
        .nav-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }
        /* 共通のボタンデザイン */
        .btn {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* 各ボタンの色分け（グランピングに合うアースカラー） */
        .btn-thanks {
            background-color: #e67e22; /* 温かみのあるオレンジ */
            color: white;
        }
        .btn-thanks:hover {
            background-color: #d35400;
        }
        .btn-memory {
            background-color: #27ae60; /* 森をイメージしたグリーン */
            color: white;
        }
        .btn-memory:hover {
            background-color: #219653;
        }
        .btn-official {
            background-color: #2c3e50; /* シックなネイビー */
            color: white;
        }
        .btn-official:hover {
            background-color: #1a252f;
        }

        /* --- フッター --- */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #bdc3c7;
            background-color: #2c3e50;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Glamping Trip</h1>
        <p>いつもの感謝を込めて</p>
    </header>

    <main>
        <section class="gallery">
            <div class="photo-card">
                <img src="1.jpg" alt="グランピング写真 1">
            </div>
            <div class="photo-card">
                <img src="2.jpg" alt="グランピング写真 2">
            </div>
            <div class="photo-card">
                <img src="3.jpg" alt="グランピング写真 3">
            </div>
        </section>

        <section class="nav-buttons">
            <button class="btn btn-thanks" id="btnThank">日々の感謝</button>
            
            <button class="btn btn-memory" id="btnMemory">過去の思い出写真を見る</button>
            
            <a href="https://www.awaji-domeglamping.com/" target="_blank" class="btn btn-official" id="btnOfficial">グランピング公式サイト</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 7/1 shoei taira</p>
    </footer>

    <script>
        // 各ボタンをクリックしたときの動きを制御します
        
        // 1. 感謝を伝えるページへの遷移
        document.getElementById('btnThank').addEventListener('click', function() {
            // 例: thanks.html に遷移する場合
            window.location.href = 'thank.html'; 
            // ※まだページがない場合はアラートを出すテスト用コードに変えることもできます：
            // alert('感謝のページへ移動します（実装待ち）');
        });

        // 2. 過去の写真ページへの遷移
        document.getElementById('btnMemory').addEventListener('click', function() {
            // 例: memory.html に遷移する場合
            window.location.href = 'memory.html';
        });

        // 3. 公式サイトへのボタン（念のためクリックログなどを残したい場合用）
        // ※HTML側の href="https://example.com" を実際のURLに書き換えるだけで動きます。
        document.getElementById('btnOfficial').addEventListener('click', function() {
            console.log('公式サイトへ移動しました');
        });
    </script>
</body>
</html>
